<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦉 OWL Dashboard</title>
<style>
:root {
  --bg: #0a0e17;
  --bg-card: #111827;
  --bg-card-hover: #1a2332;
  --border: #1e293b;
  --border-glow: #3b82f6;
  --text: #e2e8f0;
  --text-dim: #64748b;
  --text-bright: #f8fafc;
  --accent: #3b82f6;
  --accent-glow: rgba(59,130,246,0.15);
  --green: #22c55e;
  --green-dim: rgba(34,197,94,0.15);
  --red: #ef4444;
  --red-dim: rgba(239,68,68,0.15);
  --yellow: #eab308;
  --yellow-dim: rgba(234,179,8,0.15);
  --purple: #a855f7;
  --cyan: #06b6d4;
  --orange: #f97316;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  font-size: 13px;
  line-height: 1.6;
  min-height: 100vh;
}

/* --- Header --- */
.header {
  background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg) 100%);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.header h1 {
  font-size: 18px;
  font-weight: 700;
  color: var(--text-bright);
  letter-spacing: -0.5px;
}

.header h1 span { color: var(--accent); }

.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 12px;
  color: var(--text-dim);
}

.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  display: inline-block;
  animation: pulse 2s ease-in-out infinite;
}

.status-dot.green { background: var(--green); box-shadow: 0 0 8px var(--green); }
.status-dot.red { background: var(--red); box-shadow: 0 0 8px var(--red); }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* --- Layout --- */
.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 20px 24px;
}

.grid {
  display: grid;
  gap: 16px;
  margin-bottom: 16px;
}

.grid-4 { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
.grid-3 { grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); }
.grid-2 { grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); }

/* --- Cards --- */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  transition: all 0.2s ease;
  position: relative;
  overflow: hidden;
}

.card:hover {
  border-color: var(--border-glow);
  box-shadow: 0 0 20px var(--accent-glow);
  transform: translateY(-1px);
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--purple), var(--cyan));
  opacity: 0;
  transition: opacity 0.3s;
}

.card:hover::before { opacity: 1; }

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.card-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-dim);
}

.card-icon {
  font-size: 20px;
  opacity: 0.7;
}

/* --- Stat boxes --- */
.stat-row {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.stat-box {
  flex: 1;
  min-width: 100px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  text-align: center;
}

.stat-value {
  font-size: 22px;
  font-weight: 700;
  color: var(--text-bright);
  line-height: 1.2;
}

.stat-label {
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 4px;
}

/* --- Progress bars --- */
.progress-bar {
  height: 6px;
  background: rgba(255,255,255,0.06);
  border-radius: 3px;
  overflow: hidden;
  margin: 8px 0;
}

.progress-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.8s ease, background 0.3s;
}

.progress-fill.ok { background: var(--green); }
.progress-fill.warn { background: var(--yellow); }
.progress-fill.crit { background: var(--red); }
.progress-fill.info { background: var(--accent); }

.progress-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}

.progress-row .label {
  width: 80px;
  font-size: 11px;
  color: var(--text-dim);
  flex-shrink: 0;
}

.progress-row .value {
  width: 45px;
  text-align: right;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-bright);
  flex-shrink: 0;
}

.progress-row .progress-bar {
  flex: 1;
  margin: 0;
}

/* --- Service list --- */
.service-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: 8px;
  margin-bottom: 6px;
  background: rgba(255,255,255,0.02);
  border: 1px solid transparent;
  transition: all 0.2s;
}

.service-item:hover {
  background: rgba(255,255,255,0.04);
  border-color: var(--border);
}

.service-icon { font-size: 18px; flex-shrink: 0; }

.service-info { flex: 1; }

.service-name {
  font-weight: 600;
  font-size: 12px;
  color: var(--text-bright);
}

.service-port {
  font-size: 10px;
  color: var(--text-dim);
}

.service-status {
  font-size: 10px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.service-status.online {
  background: var(--green-dim);
  color: var(--green);
}

.service-status.offline {
  background: var(--red-dim);
  color: var(--red);
}

/* --- Task list --- */
.task-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 8px;
  margin-bottom: 6px;
  background: rgba(255,255,255,0.02);
  border-left: 3px solid var(--border);
  transition: all 0.2s;
}

.task-item:hover { background: rgba(255,255,255,0.04); }
.task-item.in_progress { border-left-color: var(--yellow); }
.task-item.completed { border-left-color: var(--green); opacity: 0.6; }
.task-item.pending { border-left-color: var(--accent); }
.task-item.cancelled { border-left-color: var(--red); opacity: 0.4; }

.task-check {
  width: 16px; height: 16px;
  border: 2px solid var(--text-dim);
  border-radius: 4px;
  flex-shrink: 0;
  margin-top: 2px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  transition: all 0.2s;
}

.task-check:hover { border-color: var(--accent); }
.task-check.checked { background: var(--green); border-color: var(--green); color: white; }

.task-text {
  flex: 1;
  font-size: 12px;
  color: var(--text);
}

.task-text.completed-text {
  text-decoration: line-through;
  color: var(--text-dim);
}

.task-status-badge {
  font-size: 9px;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: 8px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  flex-shrink: 0;
}

.task-status-badge.pending { background: var(--accent-glow); color: var(--accent); }
.task-status-badge.in_progress { background: var(--yellow-dim); color: var(--yellow); }
.task-status-badge.completed { background: var(--green-dim); color: var(--green); }
.task-status-badge.cancelled { background: var(--red-dim); color: var(--red); }

/* --- Activity log --- */
.activity-log {
  max-height: 300px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.activity-entry {
  padding: 6px 10px;
  border-left: 2px solid var(--border);
  margin-bottom: 4px;
  font-size: 11px;
  color: var(--text-dim);
  transition: all 0.2s;
}

.activity-entry:hover {
  border-left-color: var(--accent);
  color: var(--text);
  background: rgba(255,255,255,0.02);
}

.activity-entry .time {
  color: var(--text-dim);
  font-size: 10px;
  margin-right: 8px;
}

/* --- Cron jobs --- */
.cron-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 8px;
  margin-bottom: 6px;
  background: rgba(255,255,255,0.02);
  border: 1px solid transparent;
}

.cron-item:hover {
  background: rgba(255,255,255,0.04);
  border-color: var(--border);
}

.cron-icon { font-size: 16px; }

.cron-info { flex: 1; }

.cron-name {
  font-weight: 600;
  font-size: 12px;
  color: var(--text-bright);
}

.cron-schedule {
  font-size: 10px;
  color: var(--text-dim);
  font-family: monospace;
}

.cron-badge {
  font-size: 9px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 8px;
  text-transform: uppercase;
}

.cron-badge.enabled { background: var(--green-dim); color: var(--green); }
.cron-badge.disabled { background: var(--red-dim); color: var(--red); }

/* --- Uptime badge --- */
.uptime-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 11px;
  color: var(--text-dim);
}

/* --- Notes --- */
.notes-area {
  width: 100%;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  color: var(--text);
  font-family: inherit;
  font-size: 12px;
  resize: vertical;
  min-height: 80px;
  transition: border-color 0.2s;
}

.notes-area:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

/* --- Animations --- */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.card { animation: fadeIn 0.4s ease forwards; }
.card:nth-child(1) { animation-delay: 0.05s; }
.card:nth-child(2) { animation-delay: 0.1s; }
.card:nth-child(3) { animation-delay: 0.15s; }
.card:nth-child(4) { animation-delay: 0.2s; }

/* --- Scrollbar --- */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

/* --- Responsive --- */
@media (max-width: 768px) {
  .container { padding: 12px; }
  .header { padding: 12px 16px; }
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  .stat-row { flex-direction: column; }
}

/* --- Loading --- */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100px;
  color: var(--text-dim);
  font-size: 12px;
}

.loading::after {
  content: '';
  width: 20px; height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-left: 10px;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* --- Connection indicator --- */
.conn-indicator {
  position: fixed;
  bottom: 16px; right: 16px;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 600;
  z-index: 200;
  transition: all 0.3s;
}

.conn-indicator.connected {
  background: var(--green-dim);
  color: var(--green);
  border: 1px solid rgba(34,197,94,0.3);
}

.conn-indicator.disconnected {
  background: var(--red-dim);
  color: var(--red);
  border: 1px solid rgba(239,68,68,0.3);
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>🦉 OWL <span>Dashboard</span></h1>
  </div>
  <div class="header-right">
    <span class="uptime-badge" id="uptime-display">⏱️ Loading...</span>
    <span id="last-update">Updated: --</span>
    <span class="status-dot green" id="conn-dot" title="Live"></span>
  </div>
</div>

<div class="container">

  <!-- System Stats Row -->
  <div class="grid grid-4" id="system-stats">
    <div class="loading">Loading system stats</div>
  </div>

  <!-- Services + Cron Row -->
  <div class="grid grid-2">
    <!-- Services -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Services</span>
        <span class="card-icon">⚙️</span>
      </div>
      <div id="services-list"><div class="loading">Checking services</div></div>
    </div>

    <!-- Cron Jobs -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Scheduled Jobs</span>
        <span class="card-icon">⏰</span>
      </div>
      <div id="cron-list"><div class="loading">Loading cron jobs</div></div>
    </div>
  </div>

  <!-- Tasks + Activity Row -->
  <div class="grid grid-2">
    <!-- Active Tasks -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Active Tasks</span>
        <span class="card-icon">📋</span>
      </div>
      <div id="tasks-list"><div class="loading">Loading tasks</div></div>
    </div>

    <!-- Activity Log -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Recent Activity</span>
        <span class="card-icon">📜</span>
      </div>
      <div class="activity-log" id="activity-log"><div class="loading">Loading activity</div></div>
    </div>
  </div>

  <!-- Notes -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">Notes & Context</span>
      <span class="card-icon">💡</span>
    </div>
    <textarea class="notes-area" id="notes-area" placeholder="Current context, thoughts, reminders..."></textarea>
  </div>

</div>

<div class="conn-indicator connected" id="conn-indicator">● Live</div>

<script>
const API = '/api/status';
let currentData = null;

function pctClass(pct) {
  if (pct >= 85) return 'crit';
  if (pct >= 65) return 'warn';
  return 'ok';
}

function formatUptime(data) {
  if (!data) return '⏱️ --';
  const u = data.uptime;
  return `⏱️ ${u.days}d ${u.hours}h ${u.minutes}m`;
}

function formatTimestamp(iso) {
  if (!iso) return '--';
  const d = new Date(iso);
  return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function renderSystemStats(sys) {
  if (!sys) return '<div class="loading">No data</div>';
  
  const loadPct = Math.min(sys.load.normalized_pct, 100);
  const memPct = sys.memory.pct;
  const swapPct = sys.swap.pct;
  
  let html = '';
  
  // CPU Load
  html += `<div class="card">
    <div class="card-header"><span class="card-title">CPU Load</span><span class="card-icon">🧠</span></div>
    <div class="stat-row">
      <div class="stat-box">
        <div class="stat-value">${sys.load['1m'].toFixed(2)}</div>
        <div class="stat-label">1 min</div>
      </div>
      <div class="stat-box">
        <div class="stat-value">${sys.load['5m'].toFixed(2)}</div>
        <div class="stat-label">5 min</div>
      </div>
      <div class="stat-box">
        <div class="stat-value">${sys.load['15m'].toFixed(2)}</div>
        <div class="stat-label">15 min</div>
      </div>
    </div>
    <div class="progress-row" style="margin-top:12px">
      <span class="label">Usage</span>
      <div class="progress-bar"><div class="progress-fill ${pctClass(loadPct)}" style="width:${loadPct}%"></div></div>
      <span class="value">${loadPct}%</span>
    </div>
  </div>`;
  
  // Memory
  const memUsedGB = (sys.memory.used_kb / 1048576).toFixed(1);
  const memTotalGB = (sys.memory.total_kb / 1048576).toFixed(1);
  html += `<div class="card">
    <div class="card-header"><span class="card-title">Memory</span><span class="card-icon">💾</span></div>
    <div class="stat-row">
      <div class="stat-box">
        <div class="stat-value">${memUsedGB}GB</div>
        <div class="stat-label">Used</div>
      </div>
      <div class="stat-box">
        <div class="stat-value">${memTotalGB}GB</div>
        <div class="stat-label">Total</div>
      </div>
    </div>
    <div class="progress-row" style="margin-top:12px">
      <span class="label">RAM</span>
      <div class="progress-bar"><div class="progress-fill ${pctClass(memPct)}" style="width:${memPct}%"></div></div>
      <span class="value">${memPct}%</span>
    </div>
    <div class="progress-row">
      <span class="label">Swap</span>
      <div class="progress-bar"><div class="progress-fill ${pctClass(swapPct)}" style="width:${swapPct}%"></div></div>
      <span class="value">${swapPct}%</span>
    </div>
  </div>`;
  
  // Disk
  let diskHtml = '';
  for (const d of sys.disk) {
    diskHtml += `<div class="progress-row">
      <span class="label">${d.mount}</span>
      <div class="progress-bar"><div class="progress-fill ${pctClass(d.pct)}" style="width:${d.pct}%"></div></div>
      <span class="value">${d.pct}%</span>
    </div>`;
  }
  html += `<div class="card">
    <div class="card-header"><span class="card-title">Disk</span><span class="card-icon">💿</span></div>
    ${diskHtml || '<div style="color:var(--text-dim);font-size:12px">No disk info</div>'}
  </div>`;
  
  // Hostname
  html += `<div class="card">
    <div class="card-header"><span class="card-title">Host</span><span class="card-icon">🖥️</span></div>
    <div class="stat-row">
      <div class="stat-box">
        <div class="stat-value" style="font-size:16px">${sys.hostname}</div>
        <div class="stat-label">Hostname</div>
      </div>
      <div class="stat-box">
        <div class="stat-value">${sys.load.cpu_count}</div>
        <div class="stat-label">CPU Cores</div>
      </div>
    </div>
  </div>`;
  
  return html;
}

function renderServices(services) {
  if (!services || services.length === 0) return '<div style="color:var(--text-dim);font-size:12px;padding:8px">No services monitored</div>';
  return services.map(s => `
    <div class="service-item">
      <span class="service-icon">${s.icon}</span>
      <div class="service-info">
        <div class="service-name">${s.name}</div>
        <div class="service-port">Port ${s.port}</div>
      </div>
      <span class="service-status ${s.status}">${s.status}</span>
    </div>
  `).join('');
}

function renderCron(jobs) {
  if (!jobs || jobs.length === 0) return '<div style="color:var(--text-dim);font-size:12px;padding:8px">No scheduled jobs</div>';
  return jobs.map(j => `
    <div class="cron-item">
      <span class="cron-icon">⏰</span>
      <div class="cron-info">
        <div class="cron-name">${j.name || j.job_id || 'Unnamed'}</div>
        <div class="cron-schedule">${j.schedule || 'Unknown schedule'}</div>
      </div>
      <span class="cron-badge ${j.enabled !== false ? 'enabled' : 'disabled'}">${j.enabled !== false ? 'Active' : 'Disabled'}</span>
    </div>
  `).join('');
}

function renderTasks(tasks) {
  if (!tasks || tasks.length === 0) return '<div style="color:var(--text-dim);font-size:12px;padding:8px">No active tasks</div>';
  return tasks.map(t => `
    <div class="task-item ${t.status || 'pending'}">
      <div class="task-check ${t.status === 'completed' ? 'checked' : ''}" onclick="toggleTask('${t.id}')">${t.status === 'completed' ? '✓' : ''}</div>
      <span class="task-text ${t.status === 'completed' ? 'completed-text' : ''}">${t.content || t.name || 'Untitled'}</span>
      <span class="task-status-badge ${t.status || 'pending'}">${(t.status || 'pending').replace('_', ' ')}</span>
    </div>
  `).join('');
}

function renderActivity(activity) {
  if (!activity || activity.length === 0) return '<div style="color:var(--text-dim);font-size:12px;padding:8px">No recent activity</div>';
  return activity.map(a => {
    const parts = a.split(' | ');
    const time = parts[0] ? formatTimestamp(parts[0]) : '';
    const msg = parts.slice(1).join(' | ') || a;
    return `<div class="activity-entry"><span class="time">${time}</span>${msg}</div>`;
  }).join('');
}

async function toggleTask(id) {
  if (!currentData) return;
  const tasks = currentData.tasks || [];
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  
  const newStatus = task.status === 'completed' ? 'pending' : 'completed';
  await fetch('/api/task', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ action: 'update', id, updates: { status: newStatus } })
  });
  fetchData();
}

async function fetchData() {
  try {
    const resp = await fetch(API);
    const data = await resp.json();
    currentData = data;
    
    document.getElementById('system-stats').innerHTML = renderSystemStats(data.system);
    document.getElementById('services-list').innerHTML = renderServices(data.services);
    document.getElementById('cron-list').innerHTML = renderCron(data.cron_jobs);
    document.getElementById('tasks-list').innerHTML = renderTasks(data.tasks);
    document.getElementById('activity-log').innerHTML = renderActivity(data.activity);
    document.getElementById('uptime-display').textContent = formatUptime(data.system);
    document.getElementById('last-update').textContent = `Updated: ${formatTimestamp(data.timestamp)}`;
    
    // Connection indicator
    const ind = document.getElementById('conn-indicator');
    const dot = document.getElementById('conn-dot');
    ind.className = 'conn-indicator connected';
    ind.textContent = '● Live';
    dot.className = 'status-dot green';
  } catch (e) {
    const ind = document.getElementById('conn-indicator');
    const dot = document.getElementById('conn-dot');
    ind.className = 'conn-indicator disconnected';
    ind.textContent = '● Disconnected';
    dot.className = 'status-dot red';
    console.error('Dashboard fetch error:', e);
  }
}

// Notes auto-save
let notesTimeout;
document.getElementById('notes-area').addEventListener('input', function() {
  clearTimeout(notesTimeout);
  notesTimeout = setTimeout(async () => {
    await fetch('/api/activity', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ entry: `Notes updated` })
    });
  }, 2000);
});

// Initial fetch + auto-refresh
fetchData();
setInterval(fetchData, 5000);
</script>
